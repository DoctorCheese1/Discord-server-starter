<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cookie Autofill Detector</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 12px; width: 420px; }
      .meta { color: #555; font-size: 12px; margin-bottom: 8px; }
      .controls { margin-bottom: 10px; }
      .cookie-row { border: 1px solid #d0d7de; border-radius: 6px; padding: 8px; margin: 8px 0; }
      .cookie-name { font-weight: 700; margin-bottom: 6px; }
      input[type="text"] { width: 100%; box-sizing: border-box; margin-bottom: 6px; }
      .small { font-size: 12px; color: #555; }
      #status { margin-left: 8px; font-size: 12px; color: #0a5; }
    </style>
  </head>
  <body>
    <h3>Cookie Autofill Detector</h3>
    <div class="meta" id="meta">Loading…</div>
    <div class="controls">
      <button id="refresh">Manual refresh</button>
      <button id="copy">Copy JSON</button><span id="status"></span>
    </div>
    <div id="cookieList"></div>
    <script src="popup.js" type="module"></script>
  </body>
</html>

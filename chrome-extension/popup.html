<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cookie Autofill Detector</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #121a31;
        --panel-2: #1a2342;
        --text: #eef3ff;
        --muted: #9eb0d8;
        --accent: #5b8cff;
        --accent-2: #22c55e;
        --border: #2a3761;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 430px;
        font-family: Inter, Segoe UI, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #1a2750, var(--bg) 55%);
      }

      .wrap { padding: 14px; }
      .card {
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      }

      h3 { margin: 0 0 8px; font-size: 15px; }
      .meta {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 10px;
        line-height: 1.4;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }

      button {
        border: 1px solid #3a4a7f;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 12px;
        color: var(--text);
        background: #22325f;
        cursor: pointer;
      }
      button:hover { background: #2a3d72; }

      #status {
        display: block;
        margin-top: 8px;
        font-size: 12px;
        color: var(--accent-2);
        min-height: 16px;
      }

      #cookieList {
        max-height: 330px;
        overflow: auto;
        padding-right: 2px;
      }

      .cookie-row {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        margin: 8px 0;
        background: rgba(255, 255, 255, 0.02);
      }
      .cookie-name {
        font-weight: 700;
        color: #cfe0ff;
        margin-bottom: 7px;
        font-size: 12px;
      }

      input[type="text"], input[type="password"] {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #3a4a7f;
        background: #101937;
        color: #f4f7ff;
        padding: 8px;
        margin-bottom: 6px;
        font-size: 12px;
      }

      .small {
        font-size: 11px;
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .small input { accent-color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h3>Cookie Autofill Detector</h3>
        <div class="meta" id="meta">Loading…</div>

        <div class="controls">
          <button id="refresh">Manual refresh</button>
          <button id="copy">Copy JSON</button>
          <button id="autofill">Autofill editor</button>
        </div>
        <span id="status"></span>

        <div id="cookieList"></div>
      </div>
    </div>

    <script src="popup.js" type="module"></script>
  </body>
</html>
